services:
  libby-api:
    build:
      context: .
      dockerfile: Dockerfile
    image: 'libby-api:latest'
    container_name: libby-api
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - '8001:8000'
    volumes:
      - 'libby-data:/data'
      - 'ollama-models:/root/.ollama'
    environment:
      - 'EMBED_DB=postgresql://${POSTGRES_USER:-libby}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-libby}'
      - COLLECTION_NAME=main
      - 'OLLAMA_HOST=http://localhost:11434'
      - 'EMBEDDING_MODEL=${EMBEDDING_MODEL:-mxbai-embed-large}'
      - 'GEMINI_API_KEY=${GEMINI_API_KEY:-}'
      - 'OPENAI_API_KEY=${OPENAI_API_KEY:-}'
    restart: unless-stopped
    healthcheck:
      test:
        - CMD
        - curl
        - '-f'
        - 'http://localhost:8000/api/health'
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - libby-network
  postgres-backup:
    image: 'pgvector/pgvector:pg16'
    container_name: libby-postgres-backup
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - 'POSTGRES_DB=${POSTGRES_DB:-libby}'
      - 'POSTGRES_USER=${POSTGRES_USER:-libby}'
      - 'POSTGRES_PASSWORD=${POSTGRES_PASSWORD}'
      - POSTGRES_HOST=postgres
      - 'BACKUP_RETENTION_DAYS=${BACKUP_RETENTION_DAYS:-7}'
      - 'BACKUP_SCHEDULE=${BACKUP_SCHEDULE:-0 2 * * *}'
    volumes:
      - 'postgres-backups:/backups'
      - './scripts/backup-postgres.sh:/backup.sh:ro'
    entrypoint:
      - /bin/sh
      - '-c'
      - /backup.sh
    restart: unless-stopped
    networks:
      - libby-network
networks:
  libby-network:
    driver: bridge
volumes:
  postgres-data:
    driver: local
  postgres-backups:
    driver: local
  libby-data:
    driver: local
  ollama-models:
    driver: local
