services:
  libby-api:
    build:
      context: .
      dockerfile: Dockerfile
    image: libby-api:latest
    container_name: libby-api
    ports:
      - "8001:8000"
      # Ollama port not exposed externally (used internally only)
      # Uncomment below if you need external access to Ollama
      # - "11435:11434"
    volumes:
      - libby-data:/data
      - ollama-models:/root/.ollama  # Persist Ollama models
    environment:
      # Database configuration
      - EMBED_DB=duckdb:///data/embeddings.duckdb
      - COLLECTION_NAME=main
      
      # Ollama configuration (internal)
      - OLLAMA_HOST=http://localhost:11434
      
      # Embedding model
      - EMBEDDING_MODEL=mxbai-embed-large
      
      # Optional: API keys for other providers
      # - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      # - OPENAI_API_KEY=${OPENAI_API_KEY:-}
    
    # Restart policy
    restart: unless-stopped
    
    # Health check (increased start_period for Ollama initialization)
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  libby-data:
    driver: local
  ollama-models:
    driver: local
